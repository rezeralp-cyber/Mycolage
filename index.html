<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editor Posting - LUUNASTORE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a15; min-height: 100vh; padding: 0 0 60px; color: #fff; }

    .header { background: linear-gradient(135deg, #0d1b4b, #1a1a6e); text-align: center; padding: 24px 20px 20px; border-bottom: 2px solid #2a3a8a; }
    .header h1 { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1px; }
    .header p { color: #60a5fa; font-size: 12px; margin-top: 4px; }

    .tabs { display: flex; background: #0f0f20; border-bottom: 1px solid #1e1e3a; }
    .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 12px; font-weight: 700; color: #4a4a7a; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
    .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; background: #131328; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    
    .wrap { padding: 20px 16px; max-width: 500px; margin: 0 auto; }
    .sec-title { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #60a5fa; margin: 18px 0 12px; display: flex; align-items: center; gap: 8px; }
    .sec-title::after { content:''; flex:1; height:1px; background:#1a1a35; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: #93c5fd; margin-bottom: 6px; }
    .field input[type=text], .field input[type=number] {
      width: 100%; padding: 12px 14px; background: #131328; border: 1.5px solid #1e1e3a;
      border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: #3b82f6; }
    .field input::placeholder { color: #2a2a4a; }

    /* UPLOAD ZONE */
    .upload-zone {
      border: 2px dashed #1e1e3a; border-radius: 14px; padding: 24px;
      text-align: center; cursor: pointer; transition: border-color .2s; background: #0f0f20;
    }
    .upload-zone:hover { border-color: #3b82f6; }
    .upload-zone input { display: none; }
    .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
    .upload-zone .txt { font-size: 13px; color: #4a4a7a; }
    .upload-zone .txt span { color: #3b82f6; font-weight: 700; }

    /* PREVIEW GRID */
    .preview-grid { display: grid; gap: 4px; margin-top: 14px; border-radius: 10px; overflow: hidden; }
    .preview-grid.g1 { grid-template-columns: 1fr; }
    .preview-grid.g2 { grid-template-columns: 1fr 1fr; }
    .preview-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
    .preview-grid.g4 { grid-template-columns: 1fr 1fr; }
    .preview-grid.g6 { grid-template-columns: 1fr 1fr 1fr; }
    .preview-grid .thumb {
      aspect-ratio: 1; overflow: hidden; position: relative;
      background: #0f0f20;
    }
    .preview-grid .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-grid .thumb .del {
      position: absolute; top: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,.7); color: #fff;
      font-size: 12px; cursor: pointer;
      display: grid; place-items: center; font-weight: 700;
    }

    /* SINGLE UPLOAD */
    .single-upload {
      border: 2px dashed #1e1e3a; border-radius: 12px;
      overflow: hidden; cursor: pointer; min-height: 120px;
      display: flex; align-items: center; justify-content: center;
      background: #0f0f20; transition: border-color .2s; position: relative;
    }
    .single-upload:hover { border-color: #3b82f6; }
    .single-upload input { display: none; }
    .single-upload img { width: 100%; display: block; }
    .single-upload .placeholder { text-align: center; color: #2a2a4a; }
    .single-upload .placeholder .icon { font-size: 28px; margin-bottom: 6px; }
    .single-upload .placeholder .txt { font-size: 12px; }

    /* CANVAS */
    .canvas-wrap { margin-top: 14px; display: none; }
    canvas { width: 100%; border-radius: 12px; display: block; }

    /* TEMPLATE PREVIEW */
    .template-prev { margin-top: 14px; display:none; position:relative; border-radius:12px; overflow:hidden; }

    /* BUTTONS */
    .gen-btn {
      width: 100%; padding: 15px; margin-top: 14px;
      background: linear-gradient(135deg, #1d4ed8, #4f46e5);
      border: none; border-radius: 13px; color: #fff;
      font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit;
      transition: opacity .2s;
    }
    .gen-btn:hover { opacity: .9; }
    .dl-btn {
      width: 100%; padding: 14px; margin-top: 10px;
      background: #065f46; border: none; border-radius: 13px; color: #fff;
      font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit;
      display: none;
    }

    /* COLOR RADIO */
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-chip {
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: border-color .2s; flex-shrink: 0;
    }
    .color-chip.selected { border-color: #fff; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #22c55e; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 13px; transition: transform .3s; z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .hint { font-size: 11px; color: #2a2a5a; margin-top: 6px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🎨 EDITOR POSTING</h1>
  <p>LUUNASTORE • Collage & Auto Template</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('collage', this)">🖼️ Collage 1:1</div>
  <div class="tab" onclick="switchTab('template', this)">✨ Auto Template</div>
</div>

<!-- ═══ TAB COLLAGE ═══ -->
<div class="tab-content active" id="tab-collage">
  <div class="wrap">
    <div class="sec-title">Upload Foto</div>

    <div class="upload-zone" onclick="document.getElementById('collage-input').click()">
      <input type="file" id="collage-input" accept="image/*" multiple onchange="addCollageImages(event)"/>
      <div class="icon">📁</div>
      <div class="txt">Tap untuk upload foto<br><span>Bisa pilih banyak sekaligus</span></div>
    </div>
    <p class="hint">Mendukung 1–6 foto. Susunan otomatis menyesuaikan jumlah.</p>

    <div id="collage-preview" class="preview-grid g1" style="display:none; margin-top:14px;"></div>

    <div class="field" style="margin-top:14px;">
      <label>Warna Background</label>
      <div class="color-row" id="bg-colors">
        <div class="color-chip selected" style="background:#000" onclick="pickBg('#000',this)"></div>
        <div class="color-chip" style="background:#fff" onclick="pickBg('#fff',this)"></div>
        <div class="color-chip" style="background:#1a1a2e" onclick="pickBg('#1a1a2e',this)"></div>
        <div class="color-chip" style="background:#4b6cb7" onclick="pickBg('#4b6cb7',this)"></div>
        <div class="color-chip" style="background:#c471ed" onclick="pickBg('#c471ed',this)"></div>
        <div class="color-chip" style="background:#f7971e" onclick="pickBg('#f7971e',this)"></div>
      </div>
    </div>

    <div class="field">
      <label>Gap / Jarak antar foto</label>
      <div class="color-row">
        <div class="radio-chip selected" onclick="pickGap(0,this)">Tidak ada</div>
        <div class="radio-chip" onclick="pickGap(6,this)">Kecil</div>
        <div class="radio-chip" onclick="pickGap(14,this)">Sedang</div>
      </div>
    </div>

    <canvas id="collage-canvas" style="display:none; width:100%; border-radius:12px; margin-top:14px;"></canvas>
    <button class="gen-btn" onclick="generateCollage()">🖼️ Generate Collage</button>
    <button class="dl-btn" id="dl-collage" onclick="downloadCanvas('collage-canvas','collage-luunastore.jpg')">⬇️ Download Collage</button>
  </div>
</div>

<!-- ═══ TAB TEMPLATE ═══ -->
<div class="tab-content" id="tab-template">
  <div class="wrap">
    <div class="sec-title">Foto Akun / Produk</div>

    <div class="single-upload" onclick="document.getElementById('tmpl-img').click()">
      <input type="file" id="tmpl-img" accept="image/*" onchange="previewTmpl(event)"/>
      <div class="placeholder" id="tmpl-placeholder">
        <div class="icon">🖼️</div>
        <div class="txt">Tap upload foto akun</div>
      </div>
      <img id="tmpl-preview-img" style="display:none;"/>
    </div>

    <div class="sec-title">Info Posting</div>

    <div class="field">
      <label>Harga</label>
      <input type="text" id="tmpl-harga" placeholder="Contoh: 120k atau 150.000"/>
    </div>

    <div class="field">
      <label>Nama Store (opsional)</label>
      <input type="text" id="tmpl-store" placeholder="LUUNASTORE.IN" value="LUUNASTORE.IN"/>
    </div>

    <div class="field">
      <label>Tagline (opsional)</label>
      <input type="text" id="tmpl-tagline" placeholder="Trusted store spesialis jual beli" value="Trusted store spesialis jual beli"/>
    </div>

    <div class="field">
      <label>Nomor WA</label>
      <input type="text" id="tmpl-wa" placeholder="082123154354" value="082123154354"/>
    </div>

    <div class="field">
      <label>Instagram</label>
      <input type="text" id="tmpl-ig" placeholder="@Luunastore.in" value="@Luunastore.in"/>
    </div>

    <div class="field">
      <label>Warna Teks Harga</label>
      <div class="color-row" id="harga-colors">
        <div class="color-chip selected" style="background:#fff" onclick="pickHargaColor('#fff',this)"></div>
        <div class="color-chip" style="background:#facc15" onclick="pickHargaColor('#facc15',this)"></div>
        <div class="color-chip" style="background:#f472b6" onclick="pickHargaColor('#f472b6',this)"></div>
        <div class="color-chip" style="background:#34d399" onclick="pickHargaColor('#34d399',this)"></div>
        <div class="color-chip" style="background:#60a5fa" onclick="pickHargaColor('#60a5fa',this)"></div>
      </div>
    </div>

    <canvas id="tmpl-canvas" style="display:none; width:100%; border-radius:12px; margin-top:14px;"></canvas>
    <button class="gen-btn" onclick="generateTemplate()">✨ Generate Template</button>
    <button class="dl-btn" id="dl-tmpl" onclick="downloadCanvas('tmpl-canvas','posting-luunastore.jpg')">⬇️ Download Gambar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<style>
  .radio-chip { padding: 8px 14px; background: #131328; border: 1.5px solid #1e1e3a; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; color: #4a4a7a; user-select: none; transition: all .2s; }
  .radio-chip.selected { border-color: #3b82f6; color: #93c5fd; background: rgba(59,130,246,.15); }
</style>

<script>
  /* ─── UTILS ─── */
  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  function downloadCanvas(id, fname) {
    const c = document.getElementById(id);
    const a = document.createElement('a');
    a.href = c.toDataURL('image/jpeg', 0.92);
    a.download = fname; a.click();
  }
  function loadImg(file) {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => { const i = new Image(); i.onload = () => res(i); i.src = e.target.result; };
      r.readAsDataURL(file);
    });
  }

  /* ─── COLLAGE ─── */
  let collageFiles = [];
  let bgColor = '#000';
  let gapSize = 0;

  function addCollageImages(e) {
    const files = Array.from(e.target.files);
    collageFiles = [...collageFiles, ...files].slice(0, 6);
    renderCollagePreview();
    e.target.value = '';
  }

  function renderCollagePreview() {
    const grid = document.getElementById('collage-preview');
    if (!collageFiles.length) { grid.style.display = 'none'; return; }
    const n = collageFiles.length;
    grid.className = 'preview-grid g' + (n <= 3 ? n : n <= 4 ? 4 : 6);
    grid.style.display = 'grid';
    grid.innerHTML = '';
    collageFiles.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      const del = document.createElement('div');
      del.className = 'del'; del.textContent = '×';
      del.onclick = () => { collageFiles.splice(i,1); renderCollagePreview(); };
      div.appendChild(img); div.appendChild(del);
      grid.appendChild(div);
    });
  }

  function pickBg(color, el) {
    bgColor = color;
    document.querySelectorAll('#bg-colors .color-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }

  function pickGap(size, el) {
    gapSize = size;
    document.querySelectorAll('.radio-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function generateCollage() {
    if (!collageFiles.length) { showToast('⚠️ Upload foto dulu!'); return; }
    showToast('⏳ Generating...');

    const SIZE = 1080;
    const imgs = await Promise.all(collageFiles.map(f => loadImg(f)));
    const n = imgs.length;
    const canvas = document.getElementById('collage-canvas');
    canvas.width = SIZE; canvas.height = SIZE;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, SIZE, SIZE);

    const g = gapSize;

    // Layout
    let layout = [];
    if (n === 1) layout = [[0,0,1,1]];
    else if (n === 2) layout = [[0,0,.5,1],[.5,0,.5,1]];
    else if (n === 3) layout = [[0,0,1/3,1],[1/3,0,1/3,1],[2/3,0,1/3,1]];
    else if (n === 4) layout = [[0,0,.5,.5],[.5,0,.5,.5],[0,.5,.5,.5],[.5,.5,.5,.5]];
    else if (n === 5) layout = [[0,0,1/3,.5],[1/3,0,1/3,.5],[2/3,0,1/3,.5],[0,.5,.5,.5],[.5,.5,.5,.5]];
    else layout = [[0,0,1/3,.5],[1/3,0,1/3,.5],[2/3,0,1/3,.5],[0,.5,1/3,.5],[1/3,.5,1/3,.5],[2/3,.5,1/3,.5]];

    imgs.forEach((img, i) => {
      const [fx, fy, fw, fh] = layout[i];
      const x = fx * SIZE + g/2;
      const y = fy * SIZE + g/2;
      const w = fw * SIZE - g;
      const h = fh * SIZE - g;

      // Cover fit
      const scale = Math.max(w / img.width, h / img.height);
      const sw = img.width * scale;
      const sh = img.height * scale;
      const sx = (sw - w) / 2;
      const sy = (sh - h) / 2;

      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      ctx.drawImage(img, x - sx, y - sy, sw, sh);
      ctx.restore();
    });

    canvas.style.display = 'block';
    document.getElementById('dl-collage').style.display = 'block';
    showToast('✅ Collage siap!');
  }

  /* ─── TEMPLATE ─── */
  let tmplImgObj = null;
  let hargaColor = '#fff';

  function previewTmpl(e) {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const ph = document.getElementById('tmpl-placeholder');
    const pi = document.getElementById('tmpl-preview-img');
    ph.style.display = 'none';
    pi.style.display = 'block';
    pi.src = url;
    loadImg(file).then(img => { tmplImgObj = img; });
  }

  function pickHargaColor(c, el) {
    hargaColor = c;
    document.querySelectorAll('#harga-colors .color-chip').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function generateTemplate() {
    if (!tmplImgObj) { showToast('⚠️ Upload foto akun dulu!'); return; }
    const harga   = document.getElementById('tmpl-harga').value.trim();
    if (!harga) { showToast('⚠️ Isi harga dulu!'); return; }

    const store   = document.getElementById('tmpl-store').value.trim() || 'LUUNASTORE.IN';
    const tagline = document.getElementById('tmpl-tagline').value.trim() || 'Trusted store spesialis jual beli';
    const wa      = document.getElementById('tmpl-wa').value.trim() || '082123154354';
    const ig      = document.getElementById('tmpl-ig').value.trim() || '@Luunastore.in';

    showToast('⏳ Generating...');

    const SIZE = 1080;
    const canvas = document.getElementById('tmpl-canvas');
    canvas.width = SIZE; canvas.height = SIZE;
    const ctx = canvas.getContext('2d');

    // BG gradient biru
    const grad = ctx.createLinearGradient(0, 0, SIZE, SIZE);
    grad.addColorStop(0, '#3a6fcf');
    grad.addColorStop(0.5, '#4b82d8');
    grad.addColorStop(1, '#2855a8');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, SIZE, SIZE);

    // Dekorasi circles
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#fff';
    [[−80,300,200],[SIZE+60,280,200],[120,SIZE−100,160],[SIZE−100,SIZE−80,180]].forEach(([x,y,r]) => {
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Header area tinggi 200px
    const HEADER_H = 200;
    const PHOTO_H  = 620;
    const FOOTER_H = SIZE - HEADER_H - PHOTO_H; // ~260

    // Header text
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 72px Arial';
    ctx.fillText(store, SIZE/2, 110);
    ctx.font = 'bold 38px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText(tagline, SIZE/2, 170);

    // Foto akun (tengah)
    const img = tmplImgObj;
    const scale = Math.max(SIZE / img.width, PHOTO_H / img.height);
    const sw = img.width * scale;
    const sh = img.height * scale;
    const sx = (sw - SIZE) / 2;
    const sy = (sh - PHOTO_H) / 2;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, HEADER_H, SIZE, PHOTO_H);
    ctx.clip();
    ctx.drawImage(img, -sx, HEADER_H - sy, sw, sh);
    ctx.restore();

    // Kotak harga (bawah foto)
    const HARGA_BOX_Y = HEADER_H + PHOTO_H - 10;
    const HARGA_BOX_H = 170;
    const HARGA_BOX_W = 520;
    const HARGA_BOX_X = (SIZE - HARGA_BOX_W) / 2;

    // Background kotak dengan glow ungu
    ctx.shadowColor = '#c084fc';
    ctx.shadowBlur = 30;
    ctx.fillStyle = 'rgba(20,10,50,0.75)';
    roundRect(ctx, HARGA_BOX_X, HARGA_BOX_Y, HARGA_BOX_W, HARGA_BOX_H, 16);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border kotak ungu
    ctx.strokeStyle = '#c084fc';
    ctx.lineWidth = 4;
    roundRect(ctx, HARGA_BOX_X, HARGA_BOX_Y, HARGA_BOX_W, HARGA_BOX_H, 16);
    ctx.stroke();

    // Teks harga
    ctx.textAlign = 'center';
    ctx.fillStyle = hargaColor;
    ctx.font = 'bold 110px Arial';
    ctx.fillText(harga, SIZE/2, HARGA_BOX_Y + HARGA_BOX_H - 40);

    // Footer
    const FOOTER_Y = HARGA_BOX_Y + HARGA_BOX_H + 20;

    // WA
    ctx.textAlign = 'left';
    ctx.font = 'bold 38px Arial';
    ctx.fillStyle = '#fff';
    // WA icon lingkaran
    ctx.beginPath();
    ctx.arc(100, FOOTER_Y + 30, 28, 0, Math.PI*2);
    ctx.fillStyle = '#25D366'; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
    ctx.fillText('WA', 100, FOOTER_Y + 38);
    ctx.font = 'bold 38px Arial'; ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText(wa, 140, FOOTER_Y + 44);

    // IG
    ctx.textAlign = 'right';
    ctx.font = 'bold 38px Arial';
    ctx.fillStyle = '#fff';
    // IG icon
    ctx.beginPath();
    ctx.arc(SIZE-100, FOOTER_Y + 30, 28, 0, Math.PI*2);
    const igGrad = ctx.createLinearGradient(SIZE-128, FOOTER_Y+2, SIZE-72, FOOTER_Y+58);
    igGrad.addColorStop(0,'#f58529'); igGrad.addColorStop(0.5,'#dd2a7b'); igGrad.addColorStop(1,'#8134af');
    ctx.fillStyle = igGrad; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
    ctx.fillText('IG', SIZE-100, FOOTER_Y + 38);
    ctx.font = 'bold 38px Arial'; ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.fillText(ig, SIZE-140, FOOTER_Y + 44);

    // Swipe button
    const SW_W = 240; const SW_H = 70; const SW_X = SIZE-SW_W-40; const SW_Y = SIZE-SW_H-40;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    roundRect(ctx, SW_X, SW_Y, SW_W, SW_H, 35); ctx.fill();
    ctx.fillStyle = '#1a1a2e'; ctx.font = 'bold 34px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Swipe →', SW_X + SW_W/2, SW_Y + 46);

    canvas.style.display = 'block';
    document.getElementById('dl-tmpl').style.display = 'block';
    showToast('✅ Template siap di-download!');
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }
</script>
</body>
</html>
