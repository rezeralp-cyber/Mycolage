<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editor Posting - LUUNASTORE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a15; min-height: 100vh; padding: 0 0 60px; color: #fff; }
    .header { background: linear-gradient(135deg, #0d1b4b, #1a1a6e); text-align: center; padding: 24px 20px 20px; border-bottom: 2px solid #2a3a8a; }
    .header h1 { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1px; }
    .header p { color: #60a5fa; font-size: 12px; margin-top: 4px; }
    .tabs { display: flex; background: #0f0f20; border-bottom: 1px solid #1e1e3a; }
    .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 12px; font-weight: 700; color: #4a4a7a; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
    .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; background: #131328; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .wrap { padding: 20px 16px; max-width: 500px; margin: 0 auto; }
    .sec-title { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #60a5fa; margin: 18px 0 12px; display: flex; align-items: center; gap: 8px; }
    .sec-title::after { content:''; flex:1; height:1px; background:#1a1a35; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: #93c5fd; margin-bottom: 6px; }
    .field input[type=text] { width: 100%; padding: 12px 14px; background: #131328; border: 1.5px solid #1e1e3a; border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; }
    .field input:focus { border-color: #3b82f6; }
    .field input::placeholder { color: #2a2a4a; }
    .upload-zone { border: 2px dashed #1e1e3a; border-radius: 14px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .2s; background: #0f0f20; }
    .upload-zone:hover { border-color: #3b82f6; }
    .upload-zone input { display: none; }
    .upload-zone .uicon { font-size: 32px; margin-bottom: 8px; }
    .upload-zone .utxt { font-size: 13px; color: #4a4a7a; }
    .upload-zone .utxt span { color: #3b82f6; font-weight: 700; }
    .preview-grid { display: grid; gap: 4px; margin-top: 14px; border-radius: 10px; overflow: hidden; }
    .preview-grid .thumb { aspect-ratio: 1; overflow: hidden; position: relative; background: #0f0f20; }
    .preview-grid .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-grid .thumb .del { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,.7); color: #fff; font-size: 12px; cursor: pointer; display: grid; place-items: center; font-weight: 700; }
    .single-upload { border: 2px dashed #1e1e3a; border-radius: 12px; overflow: hidden; cursor: pointer; min-height: 120px; display: flex; align-items: center; justify-content: center; background: #0f0f20; transition: border-color .2s; position: relative; }
    .single-upload:hover { border-color: #3b82f6; }
    .single-upload input { display: none; }
    .single-upload img { width: 100%; display: block; }
    .single-upload .placeholder { text-align: center; color: #2a2a4a; }
    .single-upload .placeholder .uicon { font-size: 28px; margin-bottom: 6px; }
    .single-upload .placeholder .utxt { font-size: 12px; }
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-chip { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color .2s; flex-shrink: 0; }
    .color-chip.selected { border-color: #fff; }
    .radio-chip { padding: 8px 14px; background: #131328; border: 1.5px solid #1e1e3a; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; color: #4a4a7a; user-select: none; transition: all .2s; }
    .radio-chip.selected { border-color: #3b82f6; color: #93c5fd; background: rgba(59,130,246,.15); }
    .gen-btn { width: 100%; padding: 15px; margin-top: 14px; background: linear-gradient(135deg, #1d4ed8, #4f46e5); border: none; border-radius: 13px; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .dl-btn { width: 100%; padding: 14px; margin-top: 10px; background: #065f46; border: none; border-radius: 13px; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; display: none; }
    canvas { display: none; width: 100%; border-radius: 12px; margin-top: 14px; }
    .hint { font-size: 11px; color: #2a2a5a; margin-top: 6px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #22c55e; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 13px; transition: transform .3s; z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  
<div class="header">
  <h1>🎨 EDITOR POSTING</h1>
  <p>LUUNASTORE • Collage & Auto Template</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('collage',this)">🖼️ Collage 1:1</div>
  <div class="tab" onclick="switchTab('template',this)">✨ Auto Template</div>
</div>

<!-- COLLAGE TAB -->
<div class="tab-content active" id="tab-collage">
  <div class="wrap">
    <div class="sec-title">Upload Foto</div>
    <div class="upload-zone" onclick="document.getElementById('collage-input').click()">
      <input type="file" id="collage-input" accept="image/*" multiple onchange="addCollageImages(event)"/>
      <div class="uicon">📁</div>
      <div class="utxt">Tap untuk upload foto<br><span>Bisa pilih banyak sekaligus</span></div>
    </div>
    <p class="hint">Mendukung 1–6 foto. Susunan otomatis menyesuaikan jumlah.</p>
    <div id="collage-preview" class="preview-grid" style="display:none;"></div>

    <div class="field" style="margin-top:16px;">
      <label>Warna Background</label>
      <div class="color-row" id="bg-colors">
        <div class="color-chip selected" style="background:#000" onclick="pickBg('#000',this)"></div>
        <div class="color-chip" style="background:#fff" onclick="pickBg('#fff',this)"></div>
        <div class="color-chip" style="background:#1a1a2e" onclick="pickBg('#1a1a2e',this)"></div>
        <div class="color-chip" style="background:#4b6cb7" onclick="pickBg('#4b6cb7',this)"></div>
        <div class="color-chip" style="background:#c471ed" onclick="pickBg('#c471ed',this)"></div>
        <div class="color-chip" style="background:#f7971e" onclick="pickBg('#f7971e',this)"></div>
      </div>
    </div>
    <div class="field">
      <label>Gap / Jarak antar foto</label>
      <div class="color-row">
        <div class="radio-chip selected" onclick="pickGap(0,this)">Tidak ada</div>
        <div class="radio-chip" onclick="pickGap(6,this)">Kecil</div>
        <div class="radio-chip" onclick="pickGap(14,this)">Sedang</div>
      </div>
    </div>

    <button class="gen-btn" onclick="generateCollage()">🖼️ Generate Collage</button>
    <canvas id="collage-canvas"></canvas>
    <button class="dl-btn" id="dl-collage" onclick="downloadCanvas('collage-canvas','collage-luunastore.jpg')">⬇️ Download Collage</button>
  </div>
</div>

<!-- TEMPLATE TAB -->
<div class="tab-content" id="tab-template">
  <div class="wrap">
    <div class="sec-title">Foto Akun / Produk</div>
    <div class="single-upload" onclick="document.getElementById('tmpl-img').click()">
      <input type="file" id="tmpl-img" accept="image/*" onchange="previewTmpl(event)"/>
      <div class="placeholder" id="tmpl-placeholder">
        <div class="uicon">🖼️</div>
        <div class="utxt">Tap upload foto akun</div>
      </div>
      <img id="tmpl-preview-img" style="display:none;"/>
    </div>

    <div class="sec-title">Info Posting</div>
    <div class="field">
      <label>Harga</label>
      <input type="text" id="tmpl-harga" placeholder="Contoh: 120k atau 150.000"/>
    </div>
    <div class="field">
      <label>Nama Store</label>
      <input type="text" id="tmpl-store" value="LUUNASTORE.IN"/>
    </div>
    <div class="field">
      <label>Tagline</label>
      <input type="text" id="tmpl-tagline" value="Trusted store spesialis jual beli"/>
    </div>
    <div class="field">
      <label>Nomor WA</label>
      <input type="text" id="tmpl-wa" value="082123154354"/>
    </div>
    <div class="field">
      <label>Instagram</label>
      <input type="text" id="tmpl-ig" value="@Luunastore.in"/>
    </div>
    <div class="field">
      <label>Warna Teks Harga</label>
      <div class="color-row" id="harga-colors">
        <div class="color-chip selected" style="background:#fff" onclick="pickHargaColor('#fff',this)"></div>
        <div class="color-chip" style="background:#facc15" onclick="pickHargaColor('#facc15',this)"></div>
        <div class="color-chip" style="background:#f472b6" onclick="pickHargaColor('#f472b6',this)"></div>
        <div class="color-chip" style="background:#34d399" onclick="pickHargaColor('#34d399',this)"></div>
        <div class="color-chip" style="background:#60a5fa" onclick="pickHargaColor('#60a5fa',this)"></div>
      </div>
    </div>

    <button class="gen-btn" onclick="generateTemplate()">✨ Generate Template</button>
    <canvas id="tmpl-canvas"></canvas>
    <button class="dl-btn" id="dl-tmpl" onclick="downloadCanvas('tmpl-canvas','posting-luunastore.jpg')">⬇️ Download Gambar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var collageFiles = [];
  var bgColor = '#000';
  var gapSize = 0;
  var tmplImgObj = null;
  var hargaColor = '#fff';

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }

  function downloadCanvas(id, fname) {
    var c = document.getElementById(id);
    var a = document.createElement('a');
    a.href = c.toDataURL('image/jpeg', 0.92);
    a.download = fname; a.click();
  }

  function loadImg(file) {
    return new Promise(function(res) {
      var r = new FileReader();
      r.onload = function(e) {
        var i = new Image();
        i.onload = function(){ res(i); };
        i.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }

  function addCollageImages(e) {
    var files = Array.from(e.target.files);
    collageFiles = collageFiles.concat(files).slice(0, 6);
    renderCollagePreview();
    e.target.value = '';
  }

  function renderCollagePreview() {
    var grid = document.getElementById('collage-preview');
    if (!collageFiles.length) { grid.style.display = 'none'; return; }
    var n = collageFiles.length;
    var cols = n <= 3 ? n : (n === 4 ? 2 : 3);
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
    grid.innerHTML = '';
    collageFiles.forEach(function(f, i) {
      var div = document.createElement('div');
      div.className = 'thumb';
      var img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      var del = document.createElement('div');
      del.className = 'del'; del.textContent = 'x';
      del.onclick = (function(idx){ return function(){ collageFiles.splice(idx,1); renderCollagePreview(); }; })(i);
      div.appendChild(img); div.appendChild(del);
      grid.appendChild(div);
    });
  }

  function pickBg(color, el) {
    bgColor = color;
    document.querySelectorAll('#bg-colors .color-chip').forEach(function(c){ c.classList.remove('selected'); });
    el.classList.add('selected');
  }

  function pickGap(size, el) {
    gapSize = size;
    document.querySelectorAll('.radio-chip').forEach(function(c){ c.classList.remove('selected'); });
    el.classList.add('selected');
  }

  function generateCollage() {
    if (!collageFiles.length) { showToast('Upload foto dulu!'); return; }
    showToast('Generating...');
    Promise.all(collageFiles.map(function(f){ return loadImg(f); })).then(function(imgs) {
      var SIZE = 1080;
      var n = imgs.length;
      var canvas = document.getElementById('collage-canvas');
      canvas.width = SIZE; canvas.height = SIZE;
      var ctx = canvas.getContext('2d');

      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, SIZE, SIZE);

      var g = gapSize;
      var layout = [];
      if (n === 1) layout = [[0,0,1,1]];
      else if (n === 2) layout = [[0,0,0.5,1],[0.5,0,0.5,1]];
      else if (n === 3) layout = [[0,0,1/3,1],[1/3,0,1/3,1],[2/3,0,1/3,1]];
      else if (n === 4) layout = [[0,0,0.5,0.5],[0.5,0,0.5,0.5],[0,0.5,0.5,0.5],[0.5,0.5,0.5,0.5]];
      else if (n === 5) layout = [[0,0,1/3,0.5],[1/3,0,1/3,0.5],[2/3,0,1/3,0.5],[0,0.5,0.5,0.5],[0.5,0.5,0.5,0.5]];
      else layout = [[0,0,1/3,0.5],[1/3,0,1/3,0.5],[2/3,0,1/3,0.5],[0,0.5,1/3,0.5],[1/3,0.5,1/3,0.5],[2/3,0.5,1/3,0.5]];

      imgs.forEach(function(img, i) {
        var l = layout[i];
        var x = l[0]*SIZE + g/2;
        var y = l[1]*SIZE + g/2;
        var w = l[2]*SIZE - g;
        var h = l[3]*SIZE - g;
        var scale = Math.max(w/img.width, h/img.height);
        var sw = img.width*scale;
        var sh = img.height*scale;
        var ox = (sw-w)/2;
        var oy = (sh-h)/2;
        ctx.save();
        ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
        ctx.drawImage(img, x-ox, y-oy, sw, sh);
        ctx.restore();
      });

      canvas.style.display = 'block';
      document.getElementById('dl-collage').style.display = 'block';
      showToast('Collage siap!');
    });
  }

  function previewTmpl(e) {
    var file = e.target.files[0];
    if (!file) return;
    var url = URL.createObjectURL(file);
    document.getElementById('tmpl-placeholder').style.display = 'none';
    var pi = document.getElementById('tmpl-preview-img');
    pi.style.display = 'block'; pi.src = url;
    loadImg(file).then(function(img){ tmplImgObj = img; });
  }

  function pickHargaColor(c, el) {
    hargaColor = c;
    document.querySelectorAll('#harga-colors .color-chip').forEach(function(x){ x.classList.remove('selected'); });
    el.classList.add('selected');
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function generateTemplate() {
    if (!tmplImgObj) { showToast('Upload foto akun dulu!'); return; }
    var harga   = document.getElementById('tmpl-harga').value.trim();
    if (!harga) { showToast('Isi harga dulu!'); return; }
    var store   = document.getElementById('tmpl-store').value.trim() || 'LUUNASTORE.IN';
    var tagline = document.getElementById('tmpl-tagline').value.trim();
    var wa      = document.getElementById('tmpl-wa').value.trim();
    var ig      = document.getElementById('tmpl-ig').value.trim();

    showToast('Generating...');

    var SIZE = 1080;
    var canvas = document.getElementById('tmpl-canvas');
    canvas.width = SIZE; canvas.height = SIZE;
    var ctx = canvas.getContext('2d');

    // BG gradient
    var grad = ctx.createLinearGradient(0,0,SIZE,SIZE);
    grad.addColorStop(0,'#3a6fcf');
    grad.addColorStop(0.5,'#4b82d8');
    grad.addColorStop(1,'#2855a8');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,SIZE,SIZE);

    // Decorative circles
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = '#fff';
    var circles = [[0,300,200],[SIZE,280,200],[120,SIZE-100,160],[SIZE-100,SIZE-80,180]];
    circles.forEach(function(c){
      ctx.beginPath(); ctx.arc(c[0],c[1],c[2],0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Header
    var HEADER_H = 200;
    var PHOTO_H  = 620;

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 72px Arial';
    ctx.fillText(store, SIZE/2, 110);
    ctx.font = 'bold 36px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(tagline, SIZE/2, 168);

    // Photo
    var img = tmplImgObj;
    var scale = Math.max(SIZE/img.width, PHOTO_H/img.height);
    var sw = img.width*scale;
    var sh = img.height*scale;
    var ox = (sw-SIZE)/2;
    var oy = (sh-PHOTO_H)/2;
    ctx.save();
    ctx.beginPath(); ctx.rect(0,HEADER_H,SIZE,PHOTO_H); ctx.clip();
    ctx.drawImage(img, -ox, HEADER_H-oy, sw, sh);
    ctx.restore();

    // Harga box
    var BOX_W = 520; var BOX_H = 160;
    var BOX_X = (SIZE-BOX_W)/2;
    var BOX_Y = HEADER_H + PHOTO_H - 20;

    ctx.shadowColor = '#c084fc'; ctx.shadowBlur = 30;
    ctx.fillStyle = 'rgba(15,5,40,0.80)';
    roundRect(ctx,BOX_X,BOX_Y,BOX_W,BOX_H,16); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#c084fc'; ctx.lineWidth = 4;
    roundRect(ctx,BOX_X,BOX_Y,BOX_W,BOX_H,16); ctx.stroke();

    ctx.fillStyle = hargaColor;
    ctx.font = 'bold 100px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(harga, SIZE/2, BOX_Y+BOX_H-36);

    // Footer
    var FY = BOX_Y + BOX_H + 28;

    // WA circle
    ctx.beginPath(); ctx.arc(100,FY+30,28,0,Math.PI*2);
    ctx.fillStyle = '#25D366'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
    ctx.fillText('WA',100,FY+38);
    ctx.font = 'bold 36px Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
    ctx.fillText(wa, 140, FY+44);

    // IG circle
    ctx.beginPath(); ctx.arc(SIZE-100,FY+30,28,0,Math.PI*2);
    var igG = ctx.createLinearGradient(SIZE-128,FY+2,SIZE-72,FY+58);
    igG.addColorStop(0,'#f58529'); igG.addColorStop(0.5,'#dd2a7b'); igG.addColorStop(1,'#8134af');
    ctx.fillStyle = igG; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
    ctx.fillText('IG',SIZE-100,FY+38);
    ctx.font = 'bold 36px Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'right';
    ctx.fillText(ig, SIZE-140, FY+44);

    canvas.style.display = 'block';
    document.getElementById('dl-tmpl').style.display = 'block';
    showToast('Template siap! Tap download.');
  }
</script>
</body>
</html>
